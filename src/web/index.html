<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlightRadar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f4; --surface: #ffffff; --border: #e2e2e0; --border-strong: #c8c8c5;
    --text: #1a1a18; --muted: #6b6b68; --hint: #9b9b98; --accent: #1a1a18;
    --accent-fg: #ffffff; --green-bg: #f0fdf4; --green-border: #86efac; --green-text: #15803d;
    --amber-bg: #fffbeb; --amber-text: #92400e; --red-bg: #fef2f2; --red-text: #991b1b;
    --radius: 8px; --radius-lg: 12px;
    font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
  }

  body { background: var(--bg); color: var(--text); min-height: 100vh; }
  .layout { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  header { margin-bottom: 2rem; }
  header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.3px; }
  header p  { font-size: .8rem; color: var(--muted); margin-top: 2px; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .panel-title { font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: .85rem; }

  label { font-size: .75rem; color: var(--muted); display: block; margin-bottom: 4px; }
  input, select { width: 100%; padding: 7px 10px; font-size: .82rem; font-family: inherit; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; transition: border-color .15s; }
  input:focus, select:focus { border-color: var(--border-strong); }

  .grid { display: grid; gap: .75rem; }
  .g2 { grid-template-columns: 1fr 1fr; }
  .g3 { grid-template-columns: 1fr 1fr 1fr; }
  .field { display: flex; flex-direction: column; }
  .hint { font-size: .68rem; color: var(--hint); margin-top: 3px; }

  /* Autocomplete */
  .ac-wrap { position: relative; }
  .ac-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius); z-index: 200; max-height: 220px; overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,.1); display: none; }
  .ac-dropdown.open { display: block; }
  .ac-item { padding: 7px 10px; font-size: .78rem; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); transition: background .1s; }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.focused { background: var(--bg); }
  .ac-iata { font-weight: 700; font-size: .82rem; min-width: 36px; color: var(--accent); }
  .ac-name { color: var(--text); flex: 1; }
  .ac-country { font-size: .68rem; color: var(--hint); }
  .ac-section { padding: 5px 10px; font-size: .65rem; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--hint); background: var(--bg); border-bottom: 1px solid var(--border); pointer-events: none; }

  /* Tabs & Chips */
  .tabs { display: flex; gap: 4px; margin-bottom: 1rem; }
  .tab { padding: 5px 14px; font-size: .75rem; font-weight: 500; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: transparent; color: var(--muted); font-family: inherit; transition: all .12s; }
  .tab.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { padding: 3px 11px; font-size: .72rem; font-family: inherit; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: transparent; color: var(--muted); transition: all .12s; }
  .chip.sel { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

  .divider { font-size: .68rem; color: var(--hint); text-align: center; margin: 1rem 0; display: flex; align-items: center; gap: 8px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .btn-search { width: 100%; padding: 10px; font-size: .85rem; font-weight: 600; font-family: inherit; background: var(--accent); color: var(--accent-fg); border: none; border-radius: var(--radius); cursor: pointer; margin-top: .75rem; transition: opacity .15s; letter-spacing: .2px; }
  .btn-search:hover:not(:disabled) { opacity: .85; }
  .btn-search:disabled { opacity: .4; cursor: not-allowed; }

  /* Map */
  #map { height: 350px; width: 100%; border-radius: var(--radius); z-index: 1; border: 1px solid var(--border); margin-top: 10px; }
  #map path { cursor: pointer; }
  .map-badge { display: inline-block; background: var(--accent); color: var(--accent-fg); padding: 4px 10px; border-radius: 12px; margin-right: 5px; margin-top: 5px; font-size: 0.75rem; }

  /* Status boxes */
  .state-box { text-align: center; padding: 2.5rem 1rem; font-size: .8rem; color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--surface); }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin .65s linear infinite; margin: 0 auto .5rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err-banner { background: var(--red-bg); color: var(--red-text); font-size: .78rem; padding: 9px 12px; border-radius: var(--radius); margin-bottom: .75rem; }

  /* Results table */
  .results-meta { font-size: .72rem; color: var(--muted); margin-bottom: .75rem; }
  .results-meta strong { color: var(--text); }
  table { width: 100%; border-collapse: collapse; font-size: .78rem; }
  thead th { text-align: left; font-size: .65rem; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--hint); padding: 0 10px 8px; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }
  tbody td { padding: 10px; vertical-align: middle; }
  .best-badge { display: inline-block; background: var(--green-bg); color: var(--green-text); border: 1px solid var(--green-border); border-radius: 10px; padding: 1px 8px; font-size: .65rem; font-weight: 600; margin-left: 5px; }
  .btn-book { display: inline-block; padding: 3px 10px; font-size: .72rem; font-family: inherit; font-weight: 600; background: var(--accent); color: var(--accent-fg); border-radius: var(--radius); text-decoration: none; white-space: nowrap; transition: opacity .15s; }
  .btn-book:hover { opacity: .8; }
  .price-cell { font-weight: 700; font-size: .9rem; white-space: nowrap; }
  .route-cell { font-weight: 600; }
  .sub { font-size: .68rem; color: var(--muted); margin-top: 2px; }
  .stops-0 { color: var(--green-text); }
  .stops-1 { color: var(--amber-text); }
  .no-results { color: var(--hint); text-align: center; padding: 2rem; font-size: .8rem; }

  @media (max-width: 540px) {
    .g2, .g3 { grid-template-columns: 1fr; }
    table { font-size: .72rem; }
    thead th:nth-child(n+4), tbody td:nth-child(n+4) { display: none; }
  }
</style>
</head>
<body>
<div class="layout">

  <header>
    <h1>✈ FlightRadar</h1>
    <p>Google Flights scraper · Chromedp · Go backend</p>
  </header>

  <!-- ── ROUTE ─────────────────────────────────────────────────── -->
  <div class="panel">
    <div class="panel-title">Route</div>
    <div class="grid g2">
      <div class="field">
        <label>Origin</label>
        <div class="ac-wrap">
          <input type="text" id="origin" placeholder="City or IATA code..." value="POA"
            autocomplete="off"
            oninput="acInput('origin')"
            onkeydown="acKey(event,'origin')"
            onfocus="acInput('origin')"
            onblur="acBlur('origin')"/>
          <div class="ac-dropdown" id="ac-origin"></div>
        </div>
      </div>
      <div class="field">
        <label>Destination</label>
        <div class="ac-wrap">
          <input type="text" id="dest" placeholder="Airport, city, or country…"
            autocomplete="off"
            oninput="acInput('dest')"
            onkeydown="acKey(event,'dest')"
            onfocus="acInput('dest')"
            onblur="acBlur('dest')"/>
          <div class="ac-dropdown" id="ac-dest"></div>
        </div>
        <div id="destSummary" class="hint" style="display:none;"></div>
      </div>
    </div>

    <div class="divider">OR SELECT DESTINATIONS ON THE MAP (MAX 5)</div>
    <div id="map"></div>
    <div id="mapDisplay" style="margin-top:10px; font-size:.8rem; color:var(--muted);">No countries selected.</div>
  </div>

  <!-- ── DATES ─────────────────────────────────────────────────── -->
  <div class="panel">
    <div class="panel-title">Date mode</div>
    <div class="tabs">
      <button class="tab active" onclick="setMode('specific')">Specific dates</button>
      <button class="tab"        onclick="setMode('range')">Date range</button>
      <button class="tab"        onclick="setMode('month')">By month</button>
    </div>

    <div id="mode-specific">
      <div class="grid g2">
        <div class="field"><label>Outbound</label><input type="date" id="outDate"/></div>
        <div class="field"><label>Return (optional)</label><input type="date" id="retDate"/></div>
      </div>
    </div>

    <div id="mode-range" style="display:none;">
      <div class="divider">outbound window</div>
      <div class="grid g2">
        <div class="field"><label>Earliest departure</label><input type="date" id="outFrom"/></div>
        <div class="field"><label>Latest departure</label><input type="date" id="outTo"/></div>
      </div>
      <div class="divider">return window</div>
      <div class="grid g2">
        <div class="field"><label>Earliest return</label><input type="date" id="retFrom"/></div>
        <div class="field"><label>Latest return</label><input type="date" id="retTo"/></div>
      </div>
      <div class="grid g2" style="margin-top:.75rem;">
        <div class="field">
          <label>Max combos</label>
          <select id="maxCombos">
            <option value="4">4 — quick</option>
            <option value="8" selected>8 — balanced</option>
            <option value="16">16 — thorough</option>
          </select>
        </div>
      </div>
    </div>

    <div id="mode-month" style="display:none;">
      <div class="divider">outbound month(s)</div>
      <div class="chips" id="outMonthChips"></div>
      <div class="divider">return month(s)</div>
      <div class="chips" id="retMonthChips"></div>
      <div class="grid g3" style="margin-top:.75rem;">
        <div class="field">
          <label>Outbound year</label>
          <select id="yearOut"><option value="2026" selected>2026</option><option value="2027">2027</option></select>
        </div>
        <div class="field">
          <label>Return year</label>
          <select id="yearRet"><option value="2026">2026</option><option value="2027" selected>2027</option></select>
        </div>
        <div class="field">
          <label>Samples / month</label>
          <select id="samplesPerMonth"><option value="2">2</option><option value="4" selected>4</option><option value="8">8</option></select>
        </div>
      </div>
    </div>
  </div>

  <!-- ── OPTIONS ───────────────────────────────────────────────── -->
  <div class="panel">
    <div class="panel-title">Options</div>
    <div class="grid g3">
      <div class="field">
        <label>Passengers</label>
        <select id="adults">
          <option value="1" selected>1 adult</option>
          <option value="2">2 adults</option>
        </select>
      </div>
      <div class="field">
        <label>Cabin class</label>
        <select id="travelClass">
          <option value="1" selected>Economy</option>
          <option value="2">Premium Economy</option>
          <option value="3">Business</option>
        </select>
      </div>
      <div class="field">
        <label>Currency</label>
        <select id="currency">
          <option value="BRL" selected>BRL (R$)</option>
          <option value="USD">USD ($)</option>
          <option value="EUR">EUR (€)</option>
        </select>
      </div>
    </div>
    <button class="btn-search" id="searchBtn" onclick="doSearch()">Search flights →</button>
  </div>

  <!-- ── RESULTS ───────────────────────────────────────────────── -->
  <div id="results"></div>

</div><!-- /.layout -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────
// Airport & Region data — single source of truth
//
// AIRPORTS is the only place airport data lives. Everything else
// (autocomplete, map country→IATA lookup) is derived from it at runtime.
//
// To add an airport: add one entry here.
// ─────────────────────────────────────────────────────────────────
const AIRPORTS = [
  // Brazil
  {iata:'GRU', name:'Guarulhos Intl',        city:'São Paulo',      country:'Brazil'},
  {iata:'CGH', name:'Congonhas',              city:'São Paulo',      country:'Brazil'},
  {iata:'GIG', name:'Galeão Intl',            city:'Rio de Janeiro', country:'Brazil'},
  {iata:'POA', name:'Salgado Filho',          city:'Porto Alegre',   country:'Brazil'},
  {iata:'BSB', name:'Brasília Intl',          city:'Brasília',       country:'Brazil'},
  {iata:'SSA', name:'Deputado Luís Eduardo',  city:'Salvador',       country:'Brazil'},
  {iata:'REC', name:'Guararapes Intl',        city:'Recife',         country:'Brazil'},
  {iata:'FOR', name:'Pinto Martins',          city:'Fortaleza',      country:'Brazil'},
  // Europe
  {iata:'CDG', name:'Charles de Gaulle',      city:'Paris',          country:'France'},
  {iata:'ORY', name:'Orly',                   city:'Paris',          country:'France'},
  {iata:'LHR', name:'Heathrow',               city:'London',         country:'UK'},
  {iata:'LGW', name:'Gatwick',                city:'London',         country:'UK'},
  {iata:'FRA', name:'Frankfurt Intl',         city:'Frankfurt',      country:'Germany'},
  {iata:'MUC', name:'Munich Intl',            city:'Munich',         country:'Germany'},
  {iata:'MAD', name:'Barajas',                city:'Madrid',         country:'Spain'},
  {iata:'BCN', name:'El Prat',                city:'Barcelona',      country:'Spain'},
  {iata:'LIS', name:'Humberto Delgado',       city:'Lisbon',         country:'Portugal'},
  {iata:'FCO', name:'Fiumicino',              city:'Rome',           country:'Italy'},
  {iata:'MXP', name:'Malpensa',               city:'Milan',          country:'Italy'},
  {iata:'AMS', name:'Schiphol',               city:'Amsterdam',      country:'Netherlands'},
  {iata:'ATH', name:'Eleftherios Venizelos',  city:'Athens',         country:'Greece'},
  {iata:'IST', name:'Istanbul Intl',          city:'Istanbul',       country:'Turkey'},
  // Balkans
  {iata:'DBV', name:'Dubrovnik',              city:'Dubrovnik',      country:'Croatia'},
  {iata:'SPU', name:'Split',                  city:'Split',          country:'Croatia'},
  {iata:'ZAG', name:'Zagreb',                 city:'Zagreb',         country:'Croatia'},
  {iata:'BEG', name:'Nikola Tesla',           city:'Belgrade',       country:'Serbia'},
  {iata:'TGD', name:'Podgorica',              city:'Podgorica',      country:'Montenegro'},
  {iata:'TIA', name:'Rinas Mother Teresa',    city:'Tirana',         country:'Albania'},
  {iata:'SOF', name:'Sofia',                  city:'Sofia',          country:'Bulgaria'},
  {iata:'SKP', name:'Skopje',                 city:'Skopje',         country:'North Macedonia'},
  {iata:'SJJ', name:'Sarajevo Intl',          city:'Sarajevo',       country:'Bosnia and Herzegovina'},
  // Americas
  {iata:'JFK', name:'John F. Kennedy',        city:'New York',       country:'USA'},
  {iata:'MIA', name:'Miami Intl',             city:'Miami',          country:'USA'},
  {iata:'LAX', name:'Los Angeles Intl',       city:'Los Angeles',    country:'USA'},
  {iata:'ORD', name:"O'Hare Intl",            city:'Chicago',        country:'USA'},
  {iata:'YYZ', name:'Pearson Intl',           city:'Toronto',        country:'Canada'},
  {iata:'EZE', name:'Ezeiza',                 city:'Buenos Aires',   country:'Argentina'},
  {iata:'SCL', name:'Arturo Merino',          city:'Santiago',       country:'Chile'},
  {iata:'CUN', name:'Cancún Intl',            city:'Cancún',         country:'Mexico'},
  {iata:'PTY', name:'Tocumen Intl',           city:'Panama City',    country:'Panama'},
  // Middle East & Africa
  {iata:'DXB', name:'Dubai Intl',             city:'Dubai',          country:'UAE'},
  {iata:'DOH', name:'Hamad Intl',             city:'Doha',           country:'Qatar'},
  {iata:'CPT', name:'Cape Town Intl',         city:'Cape Town',      country:'South Africa'},
  {iata:'JNB', name:'O.R. Tambo Intl',        city:'Johannesburg',   country:'South Africa'},
  {iata:'NBO', name:'Jomo Kenyatta Intl',     city:'Nairobi',        country:'Kenya'},
  // Asia & Pacific
  {iata:'NRT', name:'Narita Intl',            city:'Tokyo',          country:'Japan'},
  {iata:'HND', name:'Haneda',                 city:'Tokyo',          country:'Japan'},
  {iata:'KIX', name:'Kansai Intl',            city:'Osaka',          country:'Japan'},
  {iata:'ICN', name:'Incheon Intl',           city:'Seoul',          country:'South Korea'},
  {iata:'BKK', name:'Suvarnabhumi',           city:'Bangkok',        country:'Thailand'},
  {iata:'SIN', name:'Changi',                 city:'Singapore',      country:'Singapore'},
  {iata:'KUL', name:'Kuala Lumpur Intl',      city:'Kuala Lumpur',   country:'Malaysia'},
  {iata:'DPS', name:'Ngurah Rai Intl',        city:'Bali',           country:'Indonesia'},
];

// countryToAirports is derived from AIRPORTS — maps GeoJSON country names to IATA codes.
// Supplemented at runtime by the Algolia dataset for countries not in AIRPORTS.
const COUNTRY_NAME_ALIASES = {
  'United States of America': 'United States',
  'Russian Federation':       'Russia',
  'Republic of Korea':        'South Korea',
  'Czechia':                  'Czech Republic',
  'Bosnia and Herz.':         'Bosnia and Herzegovina',
};

// Build the initial country→airports map from our curated AIRPORTS list.
const countryToAirports = AIRPORTS.reduce((acc, a) => {
  const key = a.country;
  if (!acc[key]) acc[key] = [];
  acc[key].push(a.iata);
  return acc;
}, {});

// ─────────────────────────────────────────────────────────────────
// App state
// ─────────────────────────────────────────────────────────────────
const MONTHS        = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const CURRENCY_SYM  = { BRL: 'R$', USD: '$', EUR: '€' };

const acState = {
  origin: { focusIdx: -1, items: [] },
  dest:   { focusIdx: -1, items: [] },
};

let mode            = 'specific';
const outMonthsSel  = new Set();
const retMonthsSel  = new Set();
// Single source of truth for all selected countries — written by both the
// autocomplete and the map, read by doSearch and renderMapDisplay.
const selectedCountries = new Set();
// Index of GeoJSON layers by country name so we can highlight/unhighlight
// them programmatically when the user picks a country via autocomplete.
const layersByCountry = {};
let geojsonLayer;

function normalizeCountry(name) {
  return COUNTRY_NAME_ALIASES[name] || name;
}

// allAirports starts as a copy of the curated list and is extended with the
// full Algolia dataset on page load. searchAirports() reads from this array,
// so autocomplete gains global coverage without any per-keystroke network calls.
const allAirports = [...AIRPORTS];

// loadGlobalAirports fetches Algolia's public airport dataset once, merges new
// entries into allAirports (for autocomplete) and countryToAirports (for the map).
// Curated entries in AIRPORTS are never overwritten or duplicated.
// Failures are non-fatal — the app works fine with the built-in data only.
async function loadGlobalAirports() {
  try {
    const res  = await fetch('https://raw.githubusercontent.com/algolia/datasets/master/airports/airports.json');
    const data = await res.json();

    // Build a set of IATA codes already in the curated list for O(1) dedup.
    const curatedIATAs = new Set(AIRPORTS.map(a => a.iata));

    for (const apt of data) {
      const iata    = apt.iata_code;
      const country = apt.country;
      const city    = apt.city || apt.name || '';
      const name    = apt.name || '';

      if (!iata || !country || iata === '\\N') continue;

      // Extend autocomplete with every valid airport not already in the curated list.
      if (!curatedIATAs.has(iata)) {
        allAirports.push({ iata, name, city, country });
        curatedIATAs.add(iata); // prevent duplicates within the Algolia set itself
      }

      // Also fill countryToAirports for map click support (cap at 5 per country).
      if (!countryToAirports[country]) countryToAirports[country] = [];
      if (!countryToAirports[country].includes(iata) && countryToAirports[country].length < 5) {
        countryToAirports[country].push(iata);
      }
    }

    console.log(`[airports] loaded ${allAirports.length} airports total`);
  } catch (e) {
    console.warn('[airports] global fetch failed — using curated data only', e);
  }
}

const map = L.map('map').setView([20, 0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 6, attribution: '© OpenStreetMap',
}).addTo(map);


function renderMapDisplay() {
  const el = document.getElementById('mapDisplay');
  if (!selectedCountries.size) { el.textContent = 'No countries selected.'; return; }
  el.innerHTML = Array.from(selectedCountries)
    .map(c => `<span class="map-badge">${c} (${(countryToAirports[c] || []).join(', ')})</span>`)
    .join('');
}

// Repaints every known GeoJSON layer to match the current selectedCountries set.
// Called after any change to selectedCountries so the map always stays in sync.
function syncMapHighlights() {
  Object.entries(layersByCountry).forEach(([name, layer]) => {
    layer.setStyle({ fillColor: selectedCountries.has(name) ? '#1a1a18' : '#e2e2e0' });
  });
}

// ─────────────────────────────────────────────────────────────────
// Autocomplete
// ─────────────────────────────────────────────────────────────────
function searchAirports(q) {
  if (!q) return [];
  const u = q.toUpperCase().trim();
  // Curated entries (AIRPORTS) naturally appear first in allAirports,
  // so exact IATA matches on well-known airports bubble to the top.
  const exact = allAirports.filter(a => a.iata.startsWith(u));
  const loose = allAirports.filter(a =>
    !a.iata.startsWith(u) &&
    (a.city.toUpperCase().includes(u) || a.name.toUpperCase().includes(u) || a.country.toUpperCase().includes(u))
  );
  return [...exact, ...loose].slice(0, 10);
}

// searchCountries returns country names from countryToAirports whose name
// matches the query — used to offer "select all airports in X" as one click.
function searchCountries(q) {
  if (!q || q.length < 2) return [];
  const u = q.toUpperCase().trim();
  return Object.keys(countryToAirports)
    .filter(c => c.toUpperCase().includes(u) && countryToAirports[c].length > 0)
    .slice(0, 4);
}

function acInput(field) {
  const input    = document.getElementById(field);
  const dropdown = document.getElementById('ac-' + field);
  const q        = input.value.trim();

  if (field === 'dest' && q.length === 0) {
    dropdown.classList.remove('open');
    acState[field].items = [];
    return;
  }

  if (field === 'dest' && selectedCountries.size > 0) {
    // User started typing after countries were selected — clear them all.
    selectedCountries.clear();
    syncMapHighlights();
    renderMapDisplay();
    document.getElementById('destSummary').style.display = 'none';
  }

  if (!q) { dropdown.classList.remove('open'); acState[field].items = []; return; }

  const airports         = searchAirports(q);
  const matchedCountries = field === 'dest' ? searchCountries(q) : [];

  if (!airports.length && !matchedCountries.length) {
    dropdown.classList.remove('open');
    acState[field].items = [];
    return;
  }

  const items = [
    ...matchedCountries.map(c => ({ type: 'country', value: c })),
    ...airports.map(a         => ({ type: 'airport', value: a.iata })),
  ];
  acState[field].items    = items;
  acState[field].focusIdx = -1;

  let html = '';
  if (matchedCountries.length) {
    html += `<div class="ac-section">Countries — all airports</div>`;
    matchedCountries.forEach(c => {
      const codes = (countryToAirports[c] || []).join(', ');
      html += `<div class="ac-item" data-field="${field}" data-type="country" data-value="${esc(c)}" onmousedown="acSelect(event)">
        <span class="ac-iata">🗺</span>
        <span class="ac-name">${esc(c)}</span>
        <span class="ac-country">${esc(codes)}</span></div>`;
    });
  }
  if (airports.length) {
    html += `<div class="ac-section">Airports</div>`;
    airports.forEach(a => {
      html += `<div class="ac-item" data-field="${field}" data-type="airport" data-value="${a.iata}" onmousedown="acSelect(event)">
        <span class="ac-iata">${a.iata}</span>
        <span class="ac-name">${esc(a.city)} — ${esc(a.name)}</span>
        <span class="ac-country">${esc(a.country)}</span></div>`;
    });
  }

  dropdown.innerHTML = html;
  dropdown.classList.add('open');
}

function acSelect(e) {
  e.preventDefault();
  const { field, type, value } = e.currentTarget.dataset;
  if (type === 'country') {
    document.getElementById('ac-' + field).classList.remove('open');
    acSelectCountry(value);
  } else {
    document.getElementById(field).value = value;
    document.getElementById('ac-' + field).classList.remove('open');
    if (field === 'dest') {
      // Single airport picked — clear any country selection.
      selectedCountries.clear();
      syncMapHighlights();
      renderMapDisplay();
      document.getElementById('destSummary').style.display = 'none';
    }
  }
}

// acSelectCountry adds a country to the shared selection set and syncs both
// the map highlight and the dest input/summary.
function acSelectCountry(country) {
  if (!countryToAirports[country]?.length) return;
  if (!selectedCountries.has(country)) {
    if (selectedCountries.size >= 5) { alert('Maximum 5 countries.'); return; }
    selectedCountries.add(country);
  }
  syncMapHighlights();
  renderMapDisplay();
  syncDestInput();
}

// syncDestInput reflects the current selectedCountries into the dest field.
// - 0 selected → clear field and summary
// - 1 selected → show country name + airport codes as hint
// - 2+ selected → show count label; detailed list is in the map display below
function syncDestInput() {
  const input   = document.getElementById('dest');
  const summary = document.getElementById('destSummary');
  const count   = selectedCountries.size;

  if (count === 0) {
    input.value          = '';
    summary.textContent  = '';
    summary.style.display = 'none';
    return;
  }

  if (count === 1) {
    const country        = [...selectedCountries][0];
    const codes          = (countryToAirports[country] || []).join(', ');
    input.value          = country;
    summary.textContent  = `→ ${codes}`;
    summary.style.display = '';
  } else {
    input.value          = `${count} countries selected`;
    summary.textContent  = Array.from(selectedCountries).join(', ');
    summary.style.display = '';
  }
}

function acBlur(field) {
  setTimeout(() => document.getElementById('ac-' + field).classList.remove('open'), 150);
}

function acKey(e, field) {
  const dropdown = document.getElementById('ac-' + field);
  if (!dropdown.classList.contains('open')) return;

  const items = dropdown.querySelectorAll('.ac-item');
  const state = acState[field];

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    state.focusIdx = Math.min(state.focusIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('focused', i === state.focusIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    state.focusIdx = Math.max(state.focusIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('focused', i === state.focusIdx));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (state.focusIdx >= 0 && items[state.focusIdx]) {
      items[state.focusIdx].dispatchEvent(new MouseEvent('mousedown'));
    }
  } else if (e.key === 'Escape') {
    dropdown.classList.remove('open');
  }
}

// ─────────────────────────────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', ['specific','range','month'][i] === m)
  );
  ['specific','range','month'].forEach(id =>
    document.getElementById('mode-' + id).style.display = id === m ? '' : 'none'
  );
}

function buildMonthChips() {
  ['outMonthChips','retMonthChips'].forEach(id => {
    const el  = document.getElementById(id);
    const set = id === 'outMonthChips' ? outMonthsSel : retMonthsSel;
    MONTHS.forEach((label, i) => {
      const btn = document.createElement('button');
      btn.className   = 'chip';
      btn.textContent = label;
      btn.onclick     = () => {
        const n = i + 1;
        if (set.has(n)) { set.delete(n); btn.classList.remove('sel'); }
        else            { set.add(n);    btn.classList.add('sel');    }
      };
      el.appendChild(btn);
    });
  });
}

// ─────────────────────────────────────────────────────────────────
// Results renderer
// ─────────────────────────────────────────────────────────────────
function renderResults(data, currency) {
  const sym = CURRENCY_SYM[currency] || currency;
  const el  = document.getElementById('results');

  if (data.error) {
    el.innerHTML = `<div class="err-banner">Server error: ${esc(data.error)}</div>`;
    return;
  }

  let html = `<div class="panel">
    <div class="panel-title">Results</div>
    <div class="results-meta">
      <strong>${data.successful ?? 0}</strong> result(s) from
      <strong>${data.total_jobs ?? 0}</strong> search(es)`;

  if (data.no_results > 0) html += ` · ${data.no_results} returned no flights`;
  if (data.errors?.length) {
    html += ` · <span style="color:var(--red-text)">${data.errors.length} error(s)</span>`;
    data.errors.forEach(e => { html += `<div class="err-banner" style="margin-top:6px;">${esc(e)}</div>`; });
  }
  html += `</div>`;

  if (!data.results?.length) {
    html += `<div class="no-results">No flights found. Try different dates or destinations.</div>`;
  } else {
    html += `<table>
      <thead><tr>
        <th>Route</th>
        <th>Dates</th>
        <th>Airline</th>
        <th>Duration</th>
        <th>Stops</th>
        <th>Price</th>
        <th></th>
      </tr></thead>
      <tbody>`;

    data.results.forEach(r => {
      const stopsClass = r.stops === 0 ? 'stops-0' : (r.stops === 1 ? 'stops-1' : '');
      const stopsLabel = r.stops === 0 ? 'Nonstop' : `${r.stops} stop${r.stops > 1 ? 's' : ''}`;
      const retLabel   = r.return_date ? ` → ${r.return_date}` : '';
      const times      = (r.dep_time && r.arr_time) ? `<div class="sub">${esc(r.dep_time)} → ${esc(r.arr_time)}</div>` : '';
      const price      = r.price > 0 ? sym + ' ' + r.price.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—';
      const bookBtn    = r.url ? `<a class="btn-book" href="${r.url}" target="_blank" rel="noopener">Book ↗</a>` : '—';

      html += `<tr>
        <td class="route-cell">
          ${esc(r.origin)} → ${esc(r.destination)}
          ${r.is_best ? '<span class="best-badge">Best</span>' : ''}
        </td>
        <td>${esc(r.outbound_date)}${esc(retLabel)}</td>
        <td>${esc(r.airline) || '—'}${times}</td>
        <td>${esc(r.duration) || '—'}</td>
        <td class="${stopsClass}">${stopsLabel}</td>
        <td class="price-cell">${price}</td>
        <td>${bookBtn}</td>
      </tr>`;
    });

    html += `</tbody></table>`;
  }

  html += `</div>`;
  el.innerHTML = html;
}

// ─────────────────────────────────────────────────────────────────
// Search execution
// ─────────────────────────────────────────────────────────────────
async function doSearch() {
  const origin = document.getElementById('origin').value.trim().toUpperCase();
  if (!origin) { alert('Please enter an origin airport.'); return; }

  // Collect destinations: selectedCountries (shared by autocomplete + map) + manual IATA input.
  let destinations = [];

  if (selectedCountries.size > 0) {
    const noAirports = [];
    selectedCountries.forEach(country => {
      const codes = countryToAirports[country] || [];
      if (codes.length === 0) noAirports.push(country);
      else destinations = destinations.concat(codes);
    });
    if (noAirports.length) {
      alert(`No airports found for: ${noAirports.join(', ')}.\nTry selecting a different country.`);
      if (!destinations.length) return;
    }
  } else if (document.getElementById('dest').value.trim()) {
    destinations = destinations.concat(
      document.getElementById('dest').value.trim().toUpperCase().split(',').map(s => s.trim()).filter(Boolean)
    );
  }

  destinations = [...new Set(destinations)]; // deduplicate

  if (!destinations.length) { alert('Please enter a destination or select one on the map.'); return; }

  const currency = document.getElementById('currency').value;

  const payload = {
    origin,
    destinations,
    mode,
    adults:       parseInt(document.getElementById('adults').value),
    travel_class: parseInt(document.getElementById('travelClass').value),
    currency,
  };

  if (mode === 'specific') {
    payload.outbound_date = document.getElementById('outDate').value;
    payload.return_date   = document.getElementById('retDate').value || undefined;
  } else if (mode === 'range') {
    payload.outbound_from = document.getElementById('outFrom').value;
    payload.outbound_to   = document.getElementById('outTo').value;
    payload.return_from   = document.getElementById('retFrom').value;
    payload.return_to     = document.getElementById('retTo').value;
    payload.max_combos    = parseInt(document.getElementById('maxCombos').value);
  } else if (mode === 'month') {
    payload.outbound_months   = [...outMonthsSel];
    payload.return_months     = [...retMonthsSel];
    payload.year              = parseInt(document.getElementById('yearOut').value);
    payload.return_year       = parseInt(document.getElementById('yearRet').value);
    payload.samples_per_month = parseInt(document.getElementById('samplesPerMonth').value);
  }

  const btn = document.getElementById('searchBtn');
  btn.disabled    = true;
  btn.textContent = 'Searching…';
  document.getElementById('results').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      Launching Chrome for ${destinations.length} destination(s)…
      <div style="margin-top:6px; font-size:.7rem; color:var(--hint);">This can take up to a minute. Please wait.</div>
    </div>`;

  try {
    const res  = await fetch('/api/search', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });
    const data = await res.json();
    renderResults(data, currency);
  } catch (e) {
    document.getElementById('results').innerHTML =
      `<div class="err-banner">Network error: ${esc(e.message)}</div>`;
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Search flights →';
  }
}

// ─────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

(async () => {
  buildMonthChips();

  // Seed the map with global airport data, then load country boundaries.
  loadGlobalAirports().then(() => {
    fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
      .then(r => r.json())
      .then(data => {
        geojsonLayer = L.geoJson(data, {
          style: { color: '#6b6b68', weight: 1, fillColor: '#e2e2e0', fillOpacity: 0.5 },
          onEachFeature(feature, layer) {
            const name = normalizeCountry(feature.properties.name);
            // Index every layer by country name for programmatic highlight access.
            layersByCountry[name] = layer;

            layer.on('click', () => {
              if (selectedCountries.has(name)) {
                selectedCountries.delete(name);
                syncMapHighlights();
                renderMapDisplay();
                syncDestInput();
              } else {
                if (selectedCountries.size >= 5) {
                  alert('Maximum 5 countries.');
                  return;
                }
                // Add the country regardless — airports may still be loading.
                // doSearch will skip countries with no airports at search time.
                selectedCountries.add(name);
                syncMapHighlights();
                renderMapDisplay();
                syncDestInput();
              }
            });

            // Show pointer cursor on hover so countries feel clickable.
            layer.on('mouseover', () => layer.setStyle({ fillOpacity: 0.8 }));
            layer.on('mouseout',  () => layer.setStyle({ fillOpacity: selectedCountries.has(name) ? 0.9 : 0.5 }));
          },
        }).addTo(map);
      })
      .catch(e => console.warn('[map] GeoJSON load failed', e));
  });

  const fmt = d => d.toISOString().slice(0, 10);
  const add = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
  const today = new Date();

  document.getElementById('outDate').value = fmt(add(today, 30));
  document.getElementById('retDate').value = fmt(add(today, 37));
  document.getElementById('outFrom').value = fmt(add(today, 25));
  document.getElementById('outTo').value   = fmt(add(today, 60));
  document.getElementById('retFrom').value = fmt(add(today, 32));
  document.getElementById('retTo').value   = fmt(add(today, 74));
})();
</script>
