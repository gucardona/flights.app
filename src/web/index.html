<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlightRadar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f4;
    --surface: #ffffff;
    --border: #e2e2e0;
    --border-strong: #c8c8c5;
    --text: #1a1a18;
    --muted: #6b6b68;
    --hint: #9b9b98;
    --accent: #1a1a18;
    --accent-fg: #ffffff;
    --green-bg: #f0fdf4;
    --green-border: #86efac;
    --green-text: #15803d;
    --amber-bg: #fffbeb;
    --amber-text: #92400e;
    --red-bg: #fef2f2;
    --red-text: #991b1b;
    --radius: 8px;
    --radius-lg: 12px;
    font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
  }

  body { background: var(--bg); color: var(--text); min-height: 100vh; }
  .layout { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  header { margin-bottom: 2rem; }
  header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.3px; }
  header p { font-size: .8rem; color: var(--muted); margin-top: 2px; }

  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem;
  }
  .panel-title {
    font-size: .7rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: .8px; color: var(--muted); margin-bottom: .85rem;
  }

  label { font-size: .75rem; color: var(--muted); display: block; margin-bottom: 4px; }
  input, select {
    width: 100%; padding: 7px 10px; font-size: .82rem; font-family: inherit;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text); outline: none; transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--border-strong); }

  .grid { display: grid; gap: .75rem; }
  .g2 { grid-template-columns: 1fr 1fr; }
  .g3 { grid-template-columns: 1fr 1fr 1fr; }
  .g4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .field { display: flex; flex-direction: column; }
  .hint { font-size: .68rem; color: var(--hint); margin-top: 3px; }

  /* ── Autocomplete ── */
  .ac-wrap { position: relative; }
  .ac-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius); z-index: 200;
    max-height: 220px; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,.1);
    display: none;
  }
  .ac-dropdown.open { display: block; }
  .ac-item {
    padding: 7px 10px; font-size: .78rem; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border); transition: background .1s;
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.focused { background: var(--bg); }
  .ac-iata {
    font-weight: 700; font-size: .82rem; min-width: 36px;
    color: var(--accent);
  }
  .ac-name { color: var(--text); flex: 1; }
  .ac-country { font-size: .68rem; color: var(--hint); }
  .ac-section {
    padding: 5px 10px; font-size: .65rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .6px;
    color: var(--hint); background: var(--bg);
    border-bottom: 1px solid var(--border); pointer-events: none;
  }

  /* mode tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 1rem; }
  .tab {
    padding: 5px 14px; font-size: .75rem; font-weight: 500;
    border: 1px solid var(--border); border-radius: 20px; cursor: pointer;
    background: transparent; color: var(--muted); font-family: inherit; transition: all .12s;
  }
  .tab.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    padding: 3px 11px; font-size: .72rem; font-family: inherit;
    border: 1px solid var(--border); border-radius: 20px;
    cursor: pointer; background: transparent; color: var(--muted); transition: all .12s;
  }
  .chip.sel { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

  .region-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .region-tag {
    padding: 3px 11px; font-size: .72rem; font-family: inherit;
    border: 1px solid var(--border); border-radius: var(--radius);
    cursor: pointer; background: transparent; color: var(--muted); transition: all .12s;
  }
  .region-tag.sel { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }

  .selected-airports { font-size: .7rem; color: var(--hint); margin-top: 6px; word-break: break-all; line-height: 1.6; }

  .divider {
    font-size: .68rem; color: var(--hint); text-align: center;
    margin: .75rem 0; display: flex; align-items: center; gap: 8px;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .btn-search {
    width: 100%; padding: 10px; font-size: .85rem; font-weight: 600;
    font-family: inherit; background: var(--accent); color: var(--accent-fg);
    border: none; border-radius: var(--radius); cursor: pointer;
    margin-top: .75rem; transition: opacity .15s; letter-spacing: .2px;
  }
  .btn-search:hover { opacity: .85; }
  .btn-search:disabled { opacity: .4; cursor: not-allowed; }

  .results-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: .75rem; font-size: .75rem; color: var(--muted); }

  .flight {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1rem 1.25rem;
    margin-bottom: .5rem; transition: border-color .15s;
  }
  .flight:hover { border-color: var(--border-strong); }
  .flight.best { border-color: var(--green-border); background: var(--green-bg); }
  .flight-row { display: flex; justify-content: space-between; align-items: center; }
  .flight-route { display: flex; align-items: center; gap: 12px; }
  .iata { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.5px; }
  .arrow { color: var(--muted); font-size: .9rem; }
  .meta { font-size: .7rem; color: var(--muted); margin-top: 1px; }
  .price-block { text-align: right; }
  .price { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px; }
  .price-meta { font-size: .68rem; color: var(--muted); margin-top: 2px; }
  .flight-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: .75rem; padding-top: .75rem;
    border-top: 1px solid var(--border); font-size: .72rem; color: var(--muted);
  }
  .badge { display: inline-block; font-size: .65rem; padding: 2px 8px; border-radius: 4px; font-weight: 500; margin-bottom: 4px; }
  .badge-best { background: var(--green-bg); color: var(--green-text); border: 1px solid var(--green-border); }
  .badge-nonstop { background: var(--green-bg); color: var(--green-text); }
  .badge-stop { background: var(--amber-bg); color: var(--amber-text); }
  .btn-book {
    font-size: .72rem; padding: 4px 12px; font-family: inherit;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: transparent; color: var(--text); cursor: pointer; transition: background .12s;
  }
  .btn-book:hover { background: var(--bg); }

  .state-box {
    text-align: center; padding: 2.5rem 1rem; font-size: .8rem; color: var(--muted);
    border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--surface);
  }
  .state-box .big { font-size: 2rem; margin-bottom: .5rem; opacity: .4; }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--text); border-radius: 50%;
    animation: spin .65s linear infinite; margin: 0 auto .5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .err { background: var(--red-bg); color: var(--red-text); font-size: .78rem; padding: 9px 12px; border-radius: var(--radius); margin-bottom: .75rem; }
  .insight { background: var(--amber-bg); color: var(--amber-text); font-size: .72rem; padding: 5px 10px; border-radius: 4px; margin-top: 5px; }

  @media (max-width: 540px) {
    .g2, .g3, .g4 { grid-template-columns: 1fr; }
    .iata { font-size: 1rem; }
  }
</style>
</head>
<body>
<div class="layout">

  <header>
    <h1>✈ FlightRadar</h1>
    <p>Google Flights scraper via SerpAPI · Go backend</p>
  </header>

  <!-- API Key -->
  <div class="panel">
    <div class="panel-title">SerpAPI Key</div>
    <div class="field">
      <input type="password" id="apiKey" placeholder="your SerpAPI key..."/>
      <span class="hint">Get a free key at serpapi.com — 100 searches/month on free tier</span>
    </div>
  </div>

  <!-- Origin & Destination -->
  <div class="panel">
    <div class="panel-title">Route</div>
    <div class="grid g2">
      <div class="field">
        <label>Origin</label>
        <div class="ac-wrap">
          <input type="text" id="origin" placeholder="City or IATA code..." value="POA"
            autocomplete="off" oninput="acInput('origin')" onkeydown="acKey(event,'origin')" onfocus="acInput('origin')" onblur="acBlur('origin')"/>
          <div class="ac-dropdown" id="ac-origin"></div>
        </div>
      </div>
      <div class="field">
        <label>Destination</label>
        <div class="ac-wrap">
          <input type="text" id="dest" placeholder="City, IATA, or leave blank for region..."
            autocomplete="off" oninput="acInput('dest')" onkeydown="acKey(event,'dest')" onfocus="acInput('dest')" onblur="acBlur('dest')"/>
          <div class="ac-dropdown" id="ac-dest"></div>
        </div>
      </div>
    </div>

    <div id="regionBox" style="margin-top: .85rem;">
      <div class="panel-title" style="margin-bottom:.5rem;">Quick regions</div>
      <div class="region-tags" id="regionTags"></div>
      <div class="selected-airports" id="selectedAirportsList"></div>
    </div>
  </div>

  <!-- Search mode -->
  <div class="panel">
    <div class="panel-title">Date mode</div>
    <div class="tabs">
      <button class="tab active" onclick="setMode('specific')">Specific dates</button>
      <button class="tab" onclick="setMode('range')">Date range</button>
      <button class="tab" onclick="setMode('month')">By month</button>
    </div>

    <div id="mode-specific">
      <div class="grid g2">
        <div class="field"><label>Outbound</label><input type="date" id="outDate"/></div>
        <div class="field"><label>Return (optional)</label><input type="date" id="retDate"/></div>
      </div>
    </div>

    <div id="mode-range" style="display:none;">
      <div class="divider">outbound window</div>
      <div class="grid g2">
        <div class="field"><label>Earliest departure</label><input type="date" id="outFrom"/></div>
        <div class="field"><label>Latest departure</label><input type="date" id="outTo"/></div>
      </div>
      <div class="divider">return window</div>
      <div class="grid g2">
        <div class="field"><label>Earliest return</label><input type="date" id="retFrom"/></div>
        <div class="field"><label>Latest return</label><input type="date" id="retTo"/></div>
      </div>
      <div class="grid g2" style="margin-top:.75rem;">
        <div class="field">
          <label>Max search combos</label>
          <select id="maxCombos">
            <option value="4">4 — quick</option>
            <option value="8" selected>8 — balanced</option>
            <option value="16">16 — thorough</option>
          </select>
        </div>
      </div>
    </div>

    <div id="mode-month" style="display:none;">
      <div class="divider">outbound month(s)</div>
      <div class="chips" id="outMonthChips"></div>
      <div class="divider">return month(s)</div>
      <div class="chips" id="retMonthChips"></div>
      <div class="grid g3" style="margin-top:.75rem;">
        <div class="field">
          <label>Outbound year</label>
          <select id="yearOut"><option value="2026" selected>2026</option><option value="2027">2027</option></select>
        </div>
        <div class="field">
          <label>Return year</label>
          <select id="yearRet"><option value="2026">2026</option><option value="2027" selected>2027</option></select>
        </div>
        <div class="field">
          <label>Samples/month</label>
          <select id="samplesPerMonth"><option value="2">2</option><option value="4" selected>4</option><option value="8">8</option></select>
        </div>
      </div>
    </div>
  </div>

  <!-- Options -->
  <div class="panel">
    <div class="panel-title">Options</div>
    <div class="grid g3">
      <div class="field">
        <label>Passengers</label>
        <select id="adults">
          <option value="1">1 adult</option><option value="2" selected>2 adults</option>
          <option value="3">3 adults</option><option value="4">4 adults</option>
        </select>
      </div>
      <div class="field">
        <label>Cabin class</label>
        <select id="travelClass">
          <option value="1" selected>Economy</option><option value="2">Premium economy</option>
          <option value="3">Business</option><option value="4">First class</option>
        </select>
      </div>
      <div class="field">
        <label>Currency</label>
        <select id="currency">
          <option value="BRL" selected>BRL (R$)</option><option value="USD">USD ($)</option>
          <option value="EUR">EUR (€)</option><option value="GBP">GBP (£)</option>
        </select>
      </div>
    </div>
    <button class="btn-search" id="searchBtn" onclick="doSearch()">Search flights →</button>
  </div>

  <div id="results"></div>
</div>

<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SYM = {BRL:'R$', USD:'$', EUR:'€', GBP:'£'};

// ── Airport database ──

  {iata:'JNB',name:'O.R. Tambo',city:'Johannesburg',country:'South Africa'},

  {iata:'NBO',name:'Jomo Kenyatta',city:'Nairobi',country:'Kenya'},
  {iata:'CMN',name:'Mohammed V',city:'Casablanca',country:'Morocco'},
  {iata:'CAI',name:'Cairo Intl',city:'Cairo',country:'Egypt'},
];

// ── Autocomplete state ──
const acState = {
  origin: { query:'', focusIdx:-1 },
  dest:   { query:'', focusIdx:-1 },
};

let regions = {};
let selectedRegion = null;
let mode = 'specific';
let outMonthsSel = new Set();
let retMonthsSel = new Set();

// Init
(async () => {
  try {
    const r = await fetch('/api/regions');
    regions = await r.json();
    buildRegionTags();
  } catch(e) { console.warn('Could not load regions', e); }
  buildMonthChips();
  const today = new Date();
  const fmt = d => d.toISOString().slice(0,10);
  const add = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
  document.getElementById('outDate').value = fmt(add(today, 30));
  document.getElementById('retDate').value = fmt(add(today, 37));
  document.getElementById('outFrom').value = fmt(add(today, 25));
  document.getElementById('outTo').value   = fmt(add(today, 60));
  document.getElementById('retFrom').value = fmt(add(today, 32));
  document.getElementById('retTo').value   = fmt(add(today, 74));
  // show origin autocomplete hint on load
  document.getElementById('origin').value = 'POA';
})();

// ── Autocomplete logic ──
function searchAirports(q) {
  if (!q || q.length < 1) return [];
  const u = q.toUpperCase().trim();
  const results = [];
  // exact IATA first
  const exact = AIRPORTS.filter(a => a.iata.startsWith(u));
  exact.forEach(a => results.push(a));
  // city/name match
  const loose = AIRPORTS.filter(a =>
    !a.iata.startsWith(u) &&
    (a.city.toUpperCase().includes(u) || a.name.toUpperCase().includes(u) || a.country.toUpperCase().includes(u))
  );
  loose.forEach(a => results.push(a));
  return results.slice(0, 8);
}

function searchRegions(q) {
  if (!q || q.length < 1) return [];
  const u = q.toLowerCase();
  return Object.keys(regions).filter(r => r.toLowerCase().includes(u));
}

function acInput(field) {
  const input = document.getElementById(field);
  const dropdown = document.getElementById('ac-' + field);
  const q = input.value.trim();
  acState[field].query = q;
  acState[field].focusIdx = -1;

  if (field === 'dest') {
    // show/hide region box
    const regionBox = document.getElementById('regionBox');
    regionBox.style.display = q.length === 0 ? '' : 'none';
    if (q.length === 0) { selectedRegion = null; document.querySelectorAll('.region-tag').forEach(b=>b.classList.remove('sel')); }
  }

  if (q.length === 0) { dropdown.classList.remove('open'); return; }

  const airports = searchAirports(q);
  const matchedRegions = field === 'dest' ? searchRegions(q) : [];

  if (airports.length === 0 && matchedRegions.length === 0) {
    dropdown.classList.remove('open');
    return;
  }

  let html = '';

  if (matchedRegions.length > 0) {
    html += `<div class="ac-section">Regions</div>`;
    matchedRegions.forEach(r => {
      const airports_list = (regions[r] || []).slice(0,4).join(', ');
      html += `<div class="ac-item" data-type="region" data-value="${esc(r)}" onmousedown="acSelectRegion('${esc(r)}')">
        <span class="ac-iata">🌍</span>
        <span class="ac-name">${esc(r)}</span>
        <span class="ac-country">${esc(airports_list)}</span>
      </div>`;
    });
  }

  if (airports.length > 0) {
    if (matchedRegions.length > 0) html += `<div class="ac-section">Airports</div>`;
    airports.forEach(a => {
      html += `<div class="ac-item" data-type="airport" data-iata="${a.iata}" onmousedown="acSelect('${field}','${a.iata}','${esc(a.city)} (${a.iata})')">
        <span class="ac-iata">${a.iata}</span>
        <span class="ac-name">${esc(a.city)} — ${esc(a.name)}</span>
        <span class="ac-country">${esc(a.country)}</span>
      </div>`;
    });
  }

  dropdown.innerHTML = html;
  dropdown.classList.add('open');
}

function acSelect(field, iata, label) {
  const input = document.getElementById(field);
  input.value = iata;
  document.getElementById('ac-' + field).classList.remove('open');
  acState[field].focusIdx = -1;
  if (field === 'dest') {
    selectedRegion = null;
    document.getElementById('regionBox').style.display = 'none';
    document.querySelectorAll('.region-tag').forEach(b=>b.classList.remove('sel'));
  }
}

function acSelectRegion(name) {
  selectedRegion = name;
  document.getElementById('dest').value = '';
  document.getElementById('ac-dest').classList.remove('open');
  document.getElementById('regionBox').style.display = '';
  document.querySelectorAll('.region-tag').forEach(b => {
    b.classList.toggle('sel', b.textContent === name);
  });
  const airports = regions[name] || [];
  document.getElementById('selectedAirportsList').textContent = '→ ' + airports.join(', ');
}

function acBlur(field) {
  // small delay so onmousedown fires first
  setTimeout(() => {
    document.getElementById('ac-' + field).classList.remove('open');
  }, 150);
}

function acKey(e, field) {
  const dropdown = document.getElementById('ac-' + field);
  if (!dropdown.classList.contains('open')) return;
  const items = dropdown.querySelectorAll('.ac-item');
  let idx = acState[field].focusIdx;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    idx = Math.min(idx + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    idx = Math.max(idx - 1, -1);
  } else if (e.key === 'Enter' && idx >= 0) {
    e.preventDefault();
    items[idx].dispatchEvent(new MouseEvent('mousedown'));
    return;
  } else if (e.key === 'Escape') {
    dropdown.classList.remove('open');
    return;
  } else { return; }

  items.forEach((item, i) => item.classList.toggle('focused', i === idx));
  acState[field].focusIdx = idx;
}

// ── Regions ──
function buildRegionTags() {
  const container = document.getElementById('regionTags');
  container.innerHTML = '';
  Object.keys(regions).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'region-tag';
    btn.textContent = name;
    btn.onclick = () => toggleRegion(name, btn);
    container.appendChild(btn);
  });
}

function toggleRegion(name, btn) {
  document.querySelectorAll('.region-tag').forEach(b=>b.classList.remove('sel'));
  if (selectedRegion === name) {
    selectedRegion = null;
    document.getElementById('selectedAirportsList').textContent = '';
    return;
  }
  selectedRegion = name;
  btn.classList.add('sel');
  const airports = regions[name] || [];
  document.getElementById('selectedAirportsList').textContent = '→ ' + airports.join(', ');
}

// ── Mode ──
function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['specific','range','month'][i] === m));
  ['specific','range','month'].forEach(id => {
    document.getElementById('mode-'+id).style.display = id === m ? '' : 'none';
  });
}

function buildMonthChips() {
  ['outMonthChips','retMonthChips'].forEach(id => {
    const el = document.getElementById(id);
    const set = id === 'outMonthChips' ? outMonthsSel : retMonthsSel;
    el.innerHTML = '';
    MONTHS.forEach((m,i) => {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = m;
      btn.onclick = () => {
        const n = i+1;
        if (set.has(n)) { set.delete(n); btn.classList.remove('sel'); }
        else { set.add(n); btn.classList.add('sel'); }
      };
      el.appendChild(btn);
    });
  });
}

// ── Search ──
async function doSearch() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('Paste your SerpAPI key first.'); return; }

  const origin = document.getElementById('origin').value.trim().toUpperCase();
  const destRaw = document.getElementById('dest').value.trim().toUpperCase();

  let destinations = [];
  if (selectedRegion && regions[selectedRegion]) {
    destinations = regions[selectedRegion].slice(0, 6);
  } else if (destRaw) {
    destinations = destRaw.split(',').map(s=>s.trim()).filter(Boolean);
  } else {
    alert('Enter a destination or select a region.'); return;
  }

  const payload = {
    api_key: apiKey, origin, destinations, mode,
    adults: parseInt(document.getElementById('adults').value),
    travel_class: parseInt(document.getElementById('travelClass').value),
    currency: document.getElementById('currency').value,
  };

  if (mode === 'specific') {
    payload.outbound_date = document.getElementById('outDate').value;
    payload.return_date   = document.getElementById('retDate').value;
  } else if (mode === 'range') {
    payload.outbound_from = document.getElementById('outFrom').value;
    payload.outbound_to   = document.getElementById('outTo').value;
    payload.return_from   = document.getElementById('retFrom').value;
    payload.return_to     = document.getElementById('retTo').value;
    payload.max_combos    = parseInt(document.getElementById('maxCombos').value);
  } else if (mode === 'month') {
    if (!outMonthsSel.size) { alert('Pick at least one outbound month.'); return; }
    payload.outbound_months   = [...outMonthsSel].sort((a,b)=>a-b);
    payload.return_months     = [...retMonthsSel].sort((a,b)=>a-b);
    payload.year              = parseInt(document.getElementById('yearOut').value);
    payload.return_year       = parseInt(document.getElementById('yearRet').value);
    payload.samples_per_month = parseInt(document.getElementById('samplesPerMonth').value);
  }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = 'Searching...';
  document.getElementById('results').innerHTML = `<div class="state-box"><div class="spinner"></div>Running searches against SerpAPI…</div>`;

  try {
    const r = await fetch('/api/search', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    if (data.error) { renderError(data.error); return; }
    renderResults(data, payload.currency);
  } catch(e) {
    renderError('Network error: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Search flights →';
  }
}

function renderError(msg) {
  document.getElementById('results').innerHTML = `<div class="err">Error: ${esc(msg)}</div>`;
}

function renderResults(data, currency) {
  const sym = SYM[currency] || '';
  const res = data.results || [];
  const errors = data.errors || [];
  let html = `<div class="results-bar"><span>${res.length} result${res.length!==1?'s':''} · ${data.successful}/${data.total_jobs} searches OK</span></div>`;

  if (errors.length) {
    html += `<div class="err">⚠ ${errors.length} search${errors.length>1?'es':''} failed:<br>${errors.slice(0,3).map(esc).join('<br>')}</div>`;
  }
  if (!res.length) {
    html += `<div class="state-box"><div class="big">✈</div>No flights found. Check your dates and IATA codes.</div>`;
    document.getElementById('results').innerHTML = html;
    return;
  }

  res.forEach(f => {
    const stops = f.stops === 0
      ? `<span class="badge badge-nonstop">nonstop</span>`
      : `<span class="badge badge-stop">${f.stops} stop${f.stops>1?'s':''}</span>`;
    const dur = `${Math.floor(f.total_duration/60)}h ${f.total_duration%60}m`;
    const retLine = f.return_date ? `<div class="price-meta">return ${f.return_date}</div>` : '';
    const insight = f.price_level ? `<div class="insight">${f.price_level} · lowest seen ${sym}${f.lowest_seen.toLocaleString()}</div>` : '';
    html += `<div class="flight${f.is_best?' best':''}">
      ${f.is_best ? '<span class="badge badge-best">best price</span>' : ''}
      <div class="flight-row">
        <div class="flight-route">
          <span class="iata">${esc(f.dep_iata||f.origin)}</span>
          <span class="arrow"> → </span>
          <span class="iata">${esc(f.arr_iata||f.destination)}</span>
          <div style="margin-left:8px;">${stops}<div class="meta">${dur} · ${esc(f.airline)}</div></div>
        </div>
        <div class="price-block">
          <div class="price">${sym}${f.price.toLocaleString()}</div>
          <div class="price-meta">${f.outbound_date}</div>
          ${retLine}
        </div>
      </div>
      ${insight}
      <div class="flight-footer">
        <span>${f.dep_time ? esc(f.dep_time)+' → '+esc(f.arr_time) : ''} ${f.flight_numbers ? '· '+esc(f.flight_numbers) : ''}</span>
        <button class="btn-book" onclick="openGF('${esc(f.origin)}','${esc(f.destination)}','${f.outbound_date}','${f.return_date||''}')">View on Google Flights ↗</button>
      </div>
    </div>`;
  });

  document.getElementById('results').innerHTML = html;
}

function openGF(from, to, out, ret) {
  const url = `https://www.google.com/travel/flights?q=Flights+${from}+to+${to}+${out}${ret?'+returning+'+ret:''}`;
  window.open(url, '_blank');
}

function esc(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
